<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="index.html">
      <img src="logo.svg" alt="Erns Consultant Logo" class="logo" />
      <span>
        <span class="brand-title">Erns Consultant</span>
        <span class="brand-subtitle">Healthcare Training</span>
      </span>
    </a>
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="courses.html">Courses</a>
      <a href="tuition.html">Tuition</a>
      <a href="register.html">Register</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>
<main>
  <section class="page-hero"><div class="container"><h1>Contact Us</h1><p>Send us a message and we will respond as soon as possible.</p></div></section>
  <section class="section"><div class="container"><div class="form-card">
    <h2>Contact Form</h2>
    <form action="https://formsubmit.co/arichardkwaku@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="New Contact Message - Erns Consultant">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="true">
      <input type="hidden" name="_next" value="https://rappiah37.github.io/web2026/thankyou.html">
      <input type="hidden" name="_autoresponse" value="Thank you for contacting Erns Consultant. We received your message and will respond soon.">
      <input type="text" name="_honey" style="display:none">
      <label>Name</label><input type="text" name="Name" required>
      <label>Email</label><input type="email" name="email" required>
      <label>Phone</label><input type="tel" name="Phone">
      <label>Message</label><textarea name="Message" rows="6" required></textarea>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div></div></section>
</main>
